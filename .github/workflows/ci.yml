name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Lint + E2E (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://abocadosos.vercel.app' }}
      E2E_USER: ${{ secrets.E2E_USER }}
      E2E_PASS: ${{ secrets.E2E_PASS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (respect .npmrc legacy-peer-deps)
        run: npm ci --legacy-peer-deps

      - name: Lint (non-blocking — deuda preexistente, ver memoria)
        run: npm run lint
        continue-on-error: true

      - name: Build (tsc -b + vite build = typecheck incluido)
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (chromium, 5 smoke specs)
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
